name: flutter_calendar_collection
description: 多样式日历组件库演示
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # 状态管理
  flutter_riverpod: ^2.6.1

  # 日期处理
  intl: 0.20.2

  # 农历算法
  lunar: ^1.3.8

  # 动画
  flutter_animate: ^4.5.2

  # 图表 (热力图)
  fl_chart: ^0.70.2

  # 工具
  collection: ^1.19.1
  equatable: ^2.0.7
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/data/
